name: Build Windows EXE

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install nuitka zstandard
      
      - name: Build EXE with Nuitka
        run: |
          python -m nuitka --onefile --windows-disable-console \
            --lto=yes --jobs=4 \
            --output-filename=DiskCleaner \
            --remove-output \
            --assume-yes-for-downloads \
            disk_cleaner.py
        shell: bash
      
      - name: Check EXE size
        shell: pwsh
        run: |
          $file = Get-Item DiskCleaner.exe
          $sizeMB = [math]::Round($file.Length / 1MB, 2)
          Write-Host "EXE Size: $sizeMB MB"
          if ($sizeMB -gt 10) {
            Write-Host "WARNING: Size is larger than expected!" -ForegroundColor Yellow
          }
      
      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: DiskCleaner-EXE
          path: DiskCleaner.exe
          retention-days: 30
