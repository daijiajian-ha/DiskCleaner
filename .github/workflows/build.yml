name: Build Windows EXE

on:
  push:
    branches:
      - master
  workflow_dispatch:
    inputs:
      python_version:
        description: 'Python version'
        required: false
        default: '3.11'
        type: string

jobs:
  build:
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python_version || '3.11' }}
      
      - name: Install UPX
        run: |
          choco install upx -y
      
      - name: Install dependencies
        run: |
          pip install psutil pyinstaller
      
      - name: Build EXE (压缩优化版)
        run: |
          # 使用 UPX 压缩，减少体积
          pyinstaller --onefile --windowed --name DiskCleaner `
            --add-binary "C:\Windows\System32\python*.dll;." `
            --exclude-module tkinter-test `
            --clean `
            disk_cleaner.py
          # UPX 压缩
          upx --best --lzma dist/DiskCleaner.exe
      
      - name: Check EXE size
        run: |
          $size = (Get-Item dist/DiskCleaner.exe).Length / 1MB
          Write-Host "EXE Size: $([math]::Round($size, 2)) MB"
      
      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: DiskCleaner-EXE
          path: dist/DiskCleaner.exe
          retention-days: 30
